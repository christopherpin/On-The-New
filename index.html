<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On The New</title>
<script>
  // Deep-link entry (?isolate=N, from the map page's "click the floating
  // object" shortcut): hide the whole page synchronously, before ANY CSS/
  // layout/paint happens, so there is no possible flash of the landing
  // splash or the full grid while the main script sets up the isolated
  // state. Revealed again at the end of that setup, further down.
  if(/[?&]isolate=/.test(location.search)){
    document.documentElement.style.visibility = 'hidden';
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#F5C518;
    --black:#0A0A0A;
    --canary:#FFE135;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    width:100%; height:100%;
    overflow:hidden; /* the grid page is a pannable canvas, not a scrolling document */
    background:var(--black);
    font-family:'JetBrains Mono', monospace;
  }

  /* ---------------- LANDING ---------------- */
  #landing{
    position:fixed; inset:0; z-index:20;
    background:var(--yellow);
    display:flex; align-items:center; justify-content:center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #landing.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .landing-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:400;
    text-align:center;
    line-height:1.0;
    font-size:clamp(48px, 9vw, 116px);
    letter-spacing:-0.01em;
    color:var(--black);
    opacity:0;
  }
  .landing-title.title-fade-in{
    animation: titleFadeIn 1.8s ease forwards;
  }
  @keyframes titleFadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  .word-trigger{
    all:unset;
    display:inline-block;
    cursor:pointer;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    color:var(--black);
    border-bottom:4px solid transparent;
    transition: border-color .25s ease, opacity .25s ease;
  }
  .word-trigger:hover, .word-trigger:focus-visible{
    border-bottom-color:var(--black);
    opacity:0.7;
  }

  #landing.inverted{ background:var(--black); }
  #landing.inverted .landing-title{ color:var(--canary); }
  #landing.inverted .word-trigger{ color:var(--canary); }
  #landing.inverted .word-trigger:hover, #landing.inverted .word-trigger:focus-visible{
    border-bottom-color:var(--canary);
    opacity:0.75;
  }

  /* ---------------- GRID STAGE ---------------- */
  #grid-stage{
    position:fixed; inset:0; z-index:10;
    background:var(--black);
    cursor:grab;
  }
  #grid-stage.dragging{ cursor:grabbing; }
  #grid-canvas{ display:block; width:100%; height:100%; }

  .hint{
    position:fixed; bottom:22px; left:26px; z-index:11;
    color:rgba(245,197,24,0.65);
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    transition:opacity .3s ease;
  }
  .counter{
    position:fixed; bottom:22px; right:26px; z-index:11;
    color:rgba(245,197,24,0.65);
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    transition:opacity .3s ease;
  }


  #leader-svg{
    position:fixed; inset:0; z-index:11;
    width:100%; height:100%;
    pointer-events:none;
  }
  .leader-line{
    stroke: rgba(10,10,10,0.5);
    stroke-width:1;
    stroke-dasharray:3 4;
  }
  body.color-inverted .leader-line{ stroke: rgba(245,197,24,0.65); }

  .nav-mark{
    position:fixed; z-index:15;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    color:#0A0A0A;
    font-size:30px;
    line-height:1;
    text-decoration:none;
    background:none;
    border:none;
    cursor:pointer;
    user-select:none;
    padding:4px;
    opacity:0.9;
    transition:opacity .2s ease, color .2s ease;
  }
  body.color-inverted .nav-mark{ color:#F5C518; }
  .nav-mark:hover{ opacity:1; }
  #nav-home{ top:20px; left:24px; z-index:21; }
  /* N is hidden while the landing screen is showing — "New" is the only
     entry point from landing; N is only for returning to the grid. */
  #landing:not(.hidden) ~ #nav-home{ display:none; }
  #nav-map{ bottom:20px; right:24px; }
  /* Nudge to click M — armed only while isolated, cleared on click or
     on returning to the grid (never shown on the grid page itself). */
  @keyframes navMapPulse{
    0%, 100% { transform:scale(1); }
    50% { transform:scale(1.3); }
  }
  #nav-map.pulse{
    animation: navMapPulse 1s ease-in-out infinite;
  }

  /* ---------------- ISOLATE INFO: photo grid + address ---------------- */
  #isolate-photos{
    position:fixed; z-index:12;
    top:58%; left:50%;
    transform:translateX(-50%);
    display:grid;
    grid-template-columns: repeat(3, 72px);
    grid-auto-rows: 72px;
    gap:8px;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
    cursor:grab;
    touch-action:none;
  }
  #isolate-photos.show{ opacity:1; pointer-events:auto; }
  #isolate-photos:active{ cursor:grabbing; }
  .photo-tile{
    border:1.5px dashed rgba(10,10,10,0.55);
    background:rgba(10,10,10,0.06);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    color:rgba(10,10,10,0.55);
    user-select:none;
  }
  body.color-inverted .photo-tile{
    border-color: rgba(245,197,24,0.6);
    background: rgba(245,197,24,0.1);
    color: rgba(245,197,24,0.75);
  }

  #isolate-address{
    position:fixed; z-index:12;
    bottom:8%; left:50%;
    transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;
    font-size:12px; letter-spacing:0.06em;
    color:rgba(10,10,10,0.75);
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
  }
  #isolate-address.show{ opacity:1; }
  body.color-inverted #isolate-address{ color: rgba(245,197,24,0.85); }

  #isolate-blockmap{
    position:fixed; z-index:12;
    bottom:20px; right:70px;
    width:300px;
    padding:0;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    cursor:grab;
    touch-action:none;
    color:rgba(10,10,10,0.8);
  }
  #isolate-blockmap svg{
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.28));
  }
  #isolate-blockmap.show{ opacity:1; pointer-events:auto; }
  #isolate-blockmap:active{ cursor:grabbing; }
  #isolate-blockmap svg{ display:block; width:100%; height:auto; }
  #isolate-blockmap .blockmap-lot{
    fill:none; stroke:currentColor; stroke-width:1; opacity:0.85;
  }
  #isolate-blockmap .blockmap-lot.highlight{
    fill:currentColor; fill-opacity:0.24; stroke-width:1.8; opacity:1; cursor:pointer;
  }
  .blockmap-label{
    margin-top:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase;
    text-align:center; opacity:0.7;
  }
  body.color-inverted #isolate-blockmap{
    color: rgba(245,197,24,0.85);
  }

  #isolate-facade{
    position:fixed; z-index:12;
    top:6%; right:5%;
    transform:none;
    width:300px;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    cursor:grab;
    touch-action:none;
    color:rgba(10,10,10,0.8);
  }
  #isolate-facade.show{ opacity:1; pointer-events:auto; }
  #isolate-facade:active{ cursor:grabbing; }
  #isolate-facade svg{
    display:block; width:100%; height:auto;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.28));
  }
  body.color-inverted #isolate-facade{ color: rgba(245,197,24,0.85); }

  .enlarged-photo{
    position:fixed; z-index:14;
    width:230px; height:230px;
    border:1.5px solid rgba(10,10,10,0.65);
    background:rgba(245,241,231,0.96);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:13px; letter-spacing:0.06em; text-transform:uppercase;
    color:rgba(10,10,10,0.6);
    cursor:grab;
    touch-action:none;
    user-select:none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .enlarged-photo:active{ cursor:grabbing; }
  body.color-inverted .enlarged-photo{
    background: rgba(10,10,10,0.96);
    border-color: rgba(245,197,24,0.6);
    color: rgba(245,197,24,0.8);
  }
  .enlarged-close{
    all:unset;
    position:absolute; top:6px; right:9px;
    cursor:pointer;
    font-size:20px; line-height:1;
    color:inherit;
    padding:4px;
    opacity:0.7;
  }
  .enlarged-close:hover{ opacity:1; }

  @media (max-width:900px){
    #isolate-photos{
      grid-template-columns: repeat(3, 56px);
      grid-auto-rows: 56px;
      top:auto; bottom:16%; right:50%; transform:translateX(50%);
    }
  }
</style>
</head>

<script>
  /* ---------------- TITLE FADE-IN ---------------- */
  function playTitleIntro(){
    const titleEl = document.getElementById('landing-title-el');
    titleEl.classList.remove('title-fade-in');
    void titleEl.offsetWidth; // force reflow so the animation can restart
    titleEl.classList.add('title-fade-in');
  }

  /* ---------------- LANDING DISMISS + INVERT ---------------- */
  const landing = document.getElementById('landing');
  document.getElementById('enter-word').addEventListener('click', () => {
    landing.classList.add('hidden');
  });
  landing.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    landing.classList.toggle('inverted');
  });

  // N always returns to the grid, no matter which screen it's clicked from
  // (landing, grid, or isolated) — it no longer opens the landing page.
  document.getElementById('nav-home').addEventListener('click', () => {
    landing.classList.add('hidden');
    if(mode === 'isolated'){
      returnToGrid();
    }
  });

  playTitleIntro();

  /* ---------------- IDLE: return to landing after 60s of inactivity ---------------- */
  let idleTimer = null;
  function resetIdleTimer(){
    clearTimeout(idleTimer);
    if(landing.classList.contains('hidden')){
      idleTimer = setTimeout(() => {
        landing.classList.remove('hidden');
        playTitleIntro();
      }, 60000);
    }
  }
  ['mousemove','pointerdown','pointermove','pointerup','wheel','keydown'].forEach(evt => {
    window.addEventListener(evt, resetIdleTimer, { passive:true });
  });
  document.getElementById('enter-word').addEventListener('click', resetIdleTimer);

  /* ---------------- GRID DATA -----------------------------------------
     225 cells (15 x 15). Each entry is a placeholder for now.
     Later: swap an entry's { kind:'placeholder' } for
     { kind:'model', url:'models/your-file.glb' } and loadCell() below
     will need a GLTFLoader branch added — the array shape is already
     set up so that's a drop-in change, not a restructure.
  ----------------------------------------------------------------------*/
  const GRID_COLS = 15;
  const GRID_ROWS = 15;
  const CELL_COUNT = GRID_COLS * GRID_ROWS;

  // Every artifact gets its own "this building" lot on the (otherwise
  // identical) floating site map, picked from the site plan's real lots.
  const BLOCK_LOT_COUNT = document.querySelectorAll('#isolate-blockmap .blockmap-lot').length;

  // Real Washington Heights addresses, cycled across artifacts — only 8
  // exist so they repeat across the 225 cells, but every artifact reads a
  // real address instead of the same placeholder string.
  const ADDRESSES = [
    '719 W 181st Street',
    '800 W 180th Street',
    '770 W 181st Street',
    '49-55 Pinehurst Ave',
    '812 W 181st Street',
    '154 Wadsworth Ave',
    '106 Pinehurst Ave',
    '603 W 183rd Street'
  ];

  // shapeIndex assignment is seeded/deterministic (not Math.random()) so it
  // comes out identically on every load — the map page replicates this
  // exact function to look up a linked grid cell's real shape, so its
  // floating-object preview actually matches what you land on instead of
  // showing an unrelated independently-random shape. (Everything else
  // about a cell — rotation, spin, address, facade — still varies freely
  // per load; only the shape needs this cross-page consistency.)
  function mulberry32(seed){
    return function(){
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const GRID_SHAPE_SEED = 1337;
  function computeShapeIndexes(){
    const rng = mulberry32(GRID_SHAPE_SEED);
    const out = [];
    for(let i=0; i<CELL_COUNT; i++){
      const col = i % GRID_COLS;
      const row = Math.floor(i / GRID_COLS);
      const forbidden = new Set();
      if(col > 0) forbidden.add(out[i-1]);                         // left
      if(row > 0) forbidden.add(out[i-GRID_COLS]);                 // top
      if(col > 0 && row > 0) forbidden.add(out[i-GRID_COLS-1]);     // top-left
      if(col < GRID_COLS-1 && row > 0) forbidden.add(out[i-GRID_COLS+1]); // top-right

      let choices = [0,1,2,3,4].filter(s => !forbidden.has(s));
      if(choices.length === 0) choices = [0,1,2,3,4];
      out.push(choices[Math.floor(rng() * choices.length)]);
    }
    return out;
  }
  const SHAPE_INDEXES = computeShapeIndexes();

  const gridData = [];
  for(let i=0; i<CELL_COUNT; i++){
    const shapeIndex = SHAPE_INDEXES[i];

    gridData.push({
      kind: 'placeholder',
      shapeIndex,
      rotSeed: new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(Math.PI*2),
      spin: 0.05 + Math.random() * 0.16,
      blockLotIndex: Math.floor(Math.random() * BLOCK_LOT_COUNT),
      address: ADDRESSES[Math.floor(Math.random() * ADDRESSES.length)],
      facade: {
        floors: 2 + Math.floor(Math.random() * 3),   // 2-4 upper stories
        bays: 2 + Math.floor(Math.random() * 3),      // 2-4 window columns per story
        groundArched: Math.random() < 0.5             // arched vs square flanking ground windows
      }
    });
  }

  /* ---------------- REAL MODELS: replace specific placeholders ------------
     Maps a placeholder shapeIndex to a real OBJ that replaces it across
     every cell that would have shown that shape. Files must sit in a
     /models folder next to index.html in the repo for the relative path
     to work.
  ----------------------------------------------------------------------*/
  const shapeModelMap = {
    0: 'models/grid_test_1_centered.obj', // was the box/cube
    1: 'models/grid_test_2_centered.obj'  // was the icosahedron
  };
  gridData.forEach(entry => {
    if(shapeModelMap[entry.shapeIndex]){
      entry.kind = 'model';
      entry.url = shapeModelMap[entry.shapeIndex];
    }
  });

  /* ---------------- RENDERER / SCENES ---------------- */
  const canvas = document.getElementById('grid-canvas');
  const stage = document.getElementById('grid-stage');
  const hintEl = document.getElementById('hint');
  const counterEl = document.getElementById('counter');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF5C518);

  const COLOR_NORMAL_BG = 0xF5C518;
  const COLOR_NORMAL_OBJ = 0x0A0A0A;
  const COLOR_INVERTED_BG = 0x0A0A0A;
  const COLOR_INVERTED_OBJ = 0xFFE135;
  let colorsInverted = false;

  function applyColorScheme(){
    scene.background.set(colorsInverted ? COLOR_INVERTED_BG : COLOR_NORMAL_BG);
    cells.forEach(c => c.materials.forEach(m => m.color.set(colorsInverted ? COLOR_INVERTED_OBJ : COLOR_NORMAL_OBJ)));
    document.body.classList.toggle('color-inverted', colorsInverted);
  }

  let viewW = window.innerWidth;
  let viewH = window.innerHeight;

  const gridCamera = new THREE.OrthographicCamera(-viewW/2, viewW/2, viewH/2, -viewH/2, 0.1, 3000);
  gridCamera.position.z = 1000;

  const inspectCamera = new THREE.PerspectiveCamera(45, viewW/viewH, 0.1, 3000);

  // SSAO for the isolate/orbit view only (grid stays plain — 225 objects
  // isn't where this matters, and it keeps this contained). Wrapped so a
  // CDN/version hiccup falls back to normal rendering rather than breaking
  // the page.
  let ssaoComposer = null;
  try {
    ssaoComposer = new THREE.EffectComposer(renderer);
    ssaoComposer.addPass(new THREE.RenderPass(scene, inspectCamera));
    const ssaoPass = new THREE.SSAOPass(scene, inspectCamera, viewW, viewH);
    ssaoPass.kernelRadius = 12;   // tuned for our object scale (roughly tens of world units, not meters)
    ssaoPass.minDistance = 0.0005;
    ssaoPass.maxDistance = 0.15;
    ssaoPass.output = THREE.SSAOPass.OUTPUT.Default;
    ssaoComposer.addPass(ssaoPass);
  } catch(err) {
    ssaoComposer = null;
  }

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const key = new THREE.DirectionalLight(0xffffff, 0.9);
  key.position.set(200, 300, 500);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0xF5C518, 0.35);
  rim.position.set(-300, -200, 200);
  scene.add(rim);

  const placeholderGeoms = [
    new THREE.BoxGeometry(1.7, 1.7, 1.7),
    new THREE.IcosahedronGeometry(1.15, 0),
    new THREE.TorusGeometry(1, 0.4, 16, 40),
    new THREE.ConeGeometry(1.1, 1.7, 24),
    new THREE.SphereGeometry(1.15, 24, 18)
  ];

  const cells = []; // { mesh, baseX, baseY, hovered, jitter, jitterTarget, scaleBase, scaleCurrent }

  function makeMaterial(){
    return new THREE.MeshStandardMaterial({
      color: colorsInverted ? COLOR_INVERTED_OBJ : COLOR_NORMAL_OBJ,
      roughness: 0.55, metalness: 0.08,
      transparent: true, opacity: 1, depthWrite: false,
      side: THREE.DoubleSide
    });
  }

  const objLoader = new THREE.OBJLoader();
  const modelCache = {}; // url -> raw loaded THREE.Group (cloned per use, never mutated directly)

  function fetchModelObject(url, onReady){
    if(modelCache[url]){ onReady(modelCache[url].clone()); return; }

    // If the raw OBJ text is embedded inline on the page (used for previewing
    // in this chat, where a real fetch() to a separate file isn't possible),
    // parse it directly instead of fetching. Falls through to a normal fetch
    // otherwise, so the real deployed site is unaffected by this.
    const inlineId = 'model-data-' + url.replace(/[^a-zA-Z0-9]/g, '_');
    const inlineEl = document.getElementById(inlineId);
    if(inlineEl){
      const obj = objLoader.parse(inlineEl.textContent);
      modelCache[url] = obj;
      onReady(obj.clone());
      return;
    }

    objLoader.load(url, (obj) => {
      modelCache[url] = obj;
      onReady(obj.clone());
    }, undefined, () => {});
  }

  function loadCell(entry, cellRef){
    const group = new THREE.Group();

    if(entry.kind === 'model'){
      const mat = makeMaterial();
      const placeholderMesh = new THREE.Mesh(placeholderGeoms[4], mat);
      group.add(placeholderMesh);
      cellRef.materials = [mat];

      fetchModelObject(entry.url, (obj) => {
        // Preserve whatever opacity the placeholder material had at swap
        // time (e.g. 0 if this cell was pre-hidden for a deep-linked
        // isolate entry) — makeMaterial() defaults to opacity:1, which was
        // silently un-hiding cells the instant their real model finished
        // loading, regardless of the cell's actual current state.
        const prevOpacity = mat.opacity;
        group.remove(placeholderMesh);
        placeholderMesh.geometry.dispose();

        const newMats = [];
        obj.traverse(child => {
          if(child.isMesh && child.geometry){
            child.geometry.computeVertexNormals(); // normalize shading regardless of source quality
            const m = makeMaterial();
            m.opacity = prevOpacity;
            child.material = m;
            newMats.push(m);
            group.add(child);
          }
        });

        cellRef.materials = newMats;
      });

      return group;
    }

    const mat = makeMaterial();
    const mesh = new THREE.Mesh(placeholderGeoms[entry.shapeIndex], mat);
    mesh.rotation.set(entry.rotSeed.x, entry.rotSeed.y, entry.rotSeed.z);
    group.add(mesh);
    cellRef.materials = [mat];
    return group;
  }

  function buildGrid(){
    cells.forEach(c => scene.remove(c.mesh));
    cells.length = 0;

    const spacingX = viewW / GRID_COLS;
    const spacingY = viewH / GRID_ROWS;
    const cellBase = Math.min(spacingX, spacingY) * 0.32;

    for(let row=0; row<GRID_ROWS; row++){
      for(let col=0; col<GRID_COLS; col++){
        const idx = row*GRID_COLS + col;
        const entry = gridData[idx];
        const baseX = (col - (GRID_COLS-1)/2) * spacingX;
        const baseY = (row - (GRID_ROWS-1)/2) * spacingY;

        const cellRef = {
          entry, baseX, baseY, scaleBase: cellBase,
          hovered:false,
          wasHovered:false,
          jitter:new THREE.Vector3(0,0,0),
          jitterTarget:new THREE.Vector3(0,0,0),
          scaleCurrent:1,
          materials: []
        };

        const group = loadCell(entry, cellRef);
        group.scale.setScalar(cellBase);
        group.position.set(baseX, baseY, 0);
        scene.add(group);
        cellRef.mesh = group;

        cells.push(cellRef);
      }
    }
  }

  /* ---------------- PAN + INFINITE WRAP ---------------- */
  const offset = { x: 0, y: 0 };

  function wrap(value, full){
    return ((value + full/2) % full + full) % full - full/2;
  }

  function applyPositions(dt){
    const fullW = viewW;
    const fullH = viewH;
    cells.forEach(c => {
      if(mode !== 'grid' && c === selected) return; // frozen while isolated

      // jitter: a single nudge on hover-enter, then it holds still until hover ends
      if(c.hovered && !c.wasHovered){
        const r = Math.min(fullW, fullH) * 0.035;
        c.jitterTarget.set((Math.random()-0.5)*r, (Math.random()-0.5)*r, Math.random()*22);
      } else if(!c.hovered){
        c.jitterTarget.set(0,0,0);
      }
      c.wasHovered = c.hovered;
      c.jitter.lerp(c.jitterTarget, 0.12);
      c.scaleCurrent += ((c.hovered ? 1.22 : 1) - c.scaleCurrent) * 0.15;

      const wx = wrap(c.baseX - offset.x, fullW);
      const wy = wrap(c.baseY - offset.y, fullH);
      c.mesh.position.set(wx + c.jitter.x, wy + c.jitter.y, c.jitter.z);
      c.mesh.scale.setScalar(c.scaleBase * c.scaleCurrent);
    });
  }

  /* ---------------- MODE STATE ---------------- */
  let mode = 'grid'; // 'grid' | 'transition' | 'isolated'
  let selected = null;
  let orbitControls = null;

  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();

  function setNdc(e){
    const r = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  }

  function meshUnderPointer(camera){
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObjects(cells.map(c => c.mesh), true);
    if(!hits.length) return null;
    // hits[0].object is whichever child mesh was actually hit inside a cell's
    // Group wrapper — walk up to that top-level group (parented directly to
    // the scene) so it matches what's stored as c.mesh.
    let obj = hits[0].object;
    while(obj && obj.parent !== scene){
      obj = obj.parent;
    }
    return cells.find(c => c.mesh === obj) || null;
  }

  /* ---------------- HOVER (grid mode only) ---------------- */
  stage.addEventListener('mousemove', (e) => {
    if(mode !== 'grid') return;
    setNdc(e);
    const hit = meshUnderPointer(gridCamera);
    cells.forEach(c => { c.hovered = (c === hit); });
  });
  stage.addEventListener('mouseleave', () => {
    cells.forEach(c => { c.hovered = false; });
  });

  /* ---------------- RIGHT-CLICK: INVERT COLOR SCHEME ---------------- */
  stage.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    colorsInverted = !colorsInverted;
    applyColorScheme();
  });

  /* ---------------- WHEEL: pan grid, or dolly-zoom when isolated ---------------- */
  stage.addEventListener('wheel', (e) => {
    if(mode === 'grid'){
      e.preventDefault();
      offset.x += e.deltaX;
      offset.y += e.deltaY;
    }
    // when isolated, OrbitControls' own wheel listener handles zoom
  }, { passive:false });

  /* ---------------- CLICK vs DRAG-PAN ---------------- */
  let dragging = false, downX=0, downY=0, lastX=0, lastY=0;
  const inertia = { x: 0, y: 0 };
  const FRICTION = 0.965;
  const INERTIA_EPSILON = 0.03;

  stage.addEventListener('pointerdown', (e) => {
    if(e.target.closest('.nav-mark')) return;
    downX = lastX = e.clientX; downY = lastY = e.clientY;
    inertia.x = 0; inertia.y = 0;
    if(mode === 'grid'){ dragging = true; stage.classList.add('dragging'); }
  });

  window.addEventListener('pointermove', (e) => {
    if(!dragging || mode !== 'grid') return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    offset.x -= dx;
    offset.y += dy;
    inertia.x = dx;
    inertia.y = dy;
  });

  window.addEventListener('pointerup', (e) => {
    if(e.target.closest('.nav-mark')) return;
    const dist = Math.hypot(e.clientX - downX, e.clientY - downY);
    if(mode === 'grid' && dist < 6){
      setNdc(e);
      const hit = meshUnderPointer(gridCamera);
      if(hit) isolate(hit);
      inertia.x = 0; inertia.y = 0;
    }
    dragging = false;
    stage.classList.remove('dragging');
  });

  /* ---------------- LEADER LINES: always connect draggable panels back to
     the isolated object. Since OrbitControls always keeps its target
     centered in frame, the object's screen position is simply the
     viewport center — no 3D-to-2D projection needed. ---------------- */
  const leaderSvg = document.getElementById('leader-svg');
  const leaderMap = new Map(); // DOM element -> its <line>

  let isolatedObjectRadius = 60; // approx on-screen pixel radius of the isolated object, set precisely in enterInspectMode

  function registerLeader(el){
    if(leaderMap.has(el)) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('class', 'leader-line');
    leaderSvg.appendChild(line);
    leaderMap.set(el, line);
    updateLeaderFor(el);
  }
  function unregisterLeader(el){
    const line = leaderMap.get(el);
    if(line){ line.remove(); leaderMap.delete(el); }
  }
  function updateLeaderFor(el){
    const line = leaderMap.get(el);
    if(!line) return;

    const cx = window.innerWidth / 2, cy = window.innerHeight / 2; // object center — always screen center while isolated
    const rect = el.getBoundingClientRect();
    const px = rect.left + rect.width / 2, py = rect.top + rect.height / 2; // panel center

    const dx = px - cx, dy = py - cy;
    const dist = Math.hypot(dx, dy) || 1;
    const ux = dx / dist, uy = dy / dist; // unit direction: object -> panel

    // Near end: stop at the edge of the object's approximate footprint,
    // so the line never draws on top of it.
    const startX = cx + ux * isolatedObjectRadius;
    const startY = cy + uy * isolatedObjectRadius;

    // Far end: stop at the edge of the panel's bounding box (ray from the
    // panel's center back toward the object), not its exact centroid.
    const hw = rect.width / 2, hh = rect.height / 2;
    const bx = -ux, by = -uy;
    const tX = bx !== 0 ? hw / Math.abs(bx) : Infinity;
    const tY = by !== 0 ? hh / Math.abs(by) : Infinity;
    const t = Math.min(tX, tY);
    const endX = px + bx * t;
    const endY = py + by * t;

    line.setAttribute('x1', startX);
    line.setAttribute('y1', startY);
    line.setAttribute('x2', endX);
    line.setAttribute('y2', endY);
  }
  function updateAllLeaders(){
    leaderMap.forEach((line, el) => updateLeaderFor(el));
  }
  window.addEventListener('resize', updateAllLeaders);

  const isolatePhotosEl = document.getElementById('isolate-photos');
  const isolateAddressEl = document.getElementById('isolate-address');
  const isolateAddressTextEl = document.getElementById('isolate-address-text');

  /* Generic drag-anywhere-on-element helper. Distinguishes a click (small
     total movement) from a real drag so panels can both be repositioned
     and still respond to clicks on their contents (e.g. a photo tile). */
  function makeDraggable(el, opts = {}){
    let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0, moved = 0, downTarget = null;

    el.addEventListener('pointerdown', (e) => {
      if(opts.ignoreSelector && e.target.closest(opts.ignoreSelector)) return;
      e.stopPropagation();
      dragging = true; moved = 0; downTarget = e.target;
      el.setPointerCapture(e.pointerId);
      const rect = el.getBoundingClientRect();
      origLeft = rect.left; origTop = rect.top;
      startX = e.clientX; startY = e.clientY;
      el.style.left = origLeft + 'px';
      el.style.top = origTop + 'px';
      el.style.right = 'auto';
      el.style.bottom = 'auto';
      el.style.transform = 'none';
    });
    el.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      e.stopPropagation();
      const dx = e.clientX - startX, dy = e.clientY - startY;
      moved = Math.max(moved, Math.hypot(dx, dy));
      el.style.left = (origLeft + dx) + 'px';
      el.style.top = (origTop + dy) + 'px';
      updateLeaderFor(el);
    });
    el.addEventListener('pointerup', (e) => {
      if(!dragging) return;
      dragging = false;
      e.stopPropagation();
      if(moved < 6 && opts.onClick) opts.onClick(downTarget, e);

      if(moved >= 6 && opts.onOffscreenReset){
        const r = el.getBoundingClientRect();
        const offscreen = r.right < 0 || r.left > window.innerWidth || r.bottom < 0 || r.top > window.innerHeight;
        if(offscreen){
          opts.onOffscreenReset();
          updateLeaderFor(el);
        }
      }
    });
  }

  function spawnEnlargedPhoto(label, x, y){
    const card = document.createElement('div');
    card.className = 'enlarged-photo';
    card.style.left = x + 'px';
    card.style.top = y + 'px';
    card.innerHTML = `<button class="enlarged-close">&times;</button><span>Photo ${label}</span>`;
    document.getElementById('grid-stage').appendChild(card);
    makeDraggable(card, {
      ignoreSelector: '.enlarged-close',
      onOffscreenReset: () => { unregisterLeader(card); card.remove(); }
    });
    registerLeader(card);
    card.querySelector('.enlarged-close').addEventListener('click', (e) => {
      e.stopPropagation();
      unregisterLeader(card);
      card.remove();
    });
  }

  makeDraggable(isolatePhotosEl, {
    onClick: (target) => {
      const tile = target.closest('.photo-tile');
      if(!tile) return;
      const rect = tile.getBoundingClientRect();
      spawnEnlargedPhoto(tile.textContent.trim(), rect.left - 20, rect.top - 20);
    },
    onOffscreenReset: () => snapPhotosHome()
  });

  let isolatePhotosHome = null;

  function resetIsolatePanelPosition(){
    if(window.innerWidth <= 900){
      // mobile default (bottom-center) is handled entirely by its own CSS rule
      isolatePhotosEl.style.left = '';
      isolatePhotosEl.style.top = '';
      isolatePhotosEl.style.right = '';
      isolatePhotosEl.style.transform = '';
      return;
    }
    // Centers the photo grid in the vertical gap between the isolated
    // object's bottom edge and the address panel's top edge, rather than a
    // fixed percentage — so it never overlaps the object regardless of the
    // object's on-screen size (isolatedObjectRadius).
    const objBottom = window.innerHeight/2 + isolatedObjectRadius;
    const addressTop = isolateAddressEl.getBoundingClientRect().top;
    const photosHeight = isolatePhotosEl.getBoundingClientRect().height;
    const midY = (objBottom + addressTop) / 2;
    isolatePhotosEl.style.left = '50%';
    isolatePhotosEl.style.top = (midY - photosHeight/2) + 'px';
    isolatePhotosEl.style.right = 'auto';
    isolatePhotosEl.style.transform = 'translateX(-50%)';
  }

  function snapPhotosHome(){
    if(!isolatePhotosHome){ resetIsolatePanelPosition(); return; }
    isolatePhotosEl.style.left = isolatePhotosHome.left + 'px';
    isolatePhotosEl.style.top = isolatePhotosHome.top + 'px';
    isolatePhotosEl.style.right = 'auto';
    isolatePhotosEl.style.transform = 'none';
  }

  const blockMapEl = document.getElementById('isolate-blockmap');
  const blockMapLots = document.querySelectorAll('#isolate-blockmap .blockmap-lot');

  // Restyles the site plan so a different lot reads as "this building" —
  // called whenever a new artifact is isolated, so every artifact gets its
  // own highlighted lot on the otherwise-identical block diagram.
  function applyBlockMapHighlight(lotIndex){
    blockMapLots.forEach((el, i) => {
      el.classList.toggle('highlight', i === lotIndex);
    });
  }

  makeDraggable(blockMapEl, {
    onOffscreenReset: () => {
      blockMapEl.classList.remove('show');
      unregisterLeader(blockMapEl);
    }
  });

  function resetBlockMapPosition(){
    blockMapEl.style.left = 'auto';
    blockMapEl.style.right = '70px';
    blockMapEl.style.top = 'auto';
    blockMapEl.style.bottom = '20px';
    blockMapEl.style.transform = 'none';
  }

  function toggleBlockMap(){
    const opening = !blockMapEl.classList.contains('show');
    if(opening){
      resetBlockMapPosition();
      blockMapEl.classList.add('show');
      registerLeader(blockMapEl);
    } else {
      blockMapEl.classList.remove('show');
      unregisterLeader(blockMapEl);
    }
  }

  const facadeEl = document.getElementById('isolate-facade');
  const facadeSvgEl = document.getElementById('facade-svg');

  // Builds the elevation line-drawing for one artifact from its facade
  // params (floors/bays/groundArched) — same visual language (cornice,
  // floor dividers, arched-or-square ground windows, stoop) as the
  // original hand-drawn version, but no triangles anywhere: the old
  // cornice brackets and the peaked door lintel are gone, replaced with
  // a plain cornice band and a flat lintel line.
  function buildFacadeMarkup(p){
    const bx = 30, bw = 140, bTop = 30, bBottom = 240, groundTop = 168;
    const corniceH = 12;
    let out = '';
    out += `<line x1="10" y1="240" x2="190" y2="240" stroke="currentColor" stroke-width="1" opacity="0.6"/>`;
    out += `<rect x="${bx}" y="${bTop}" width="${bw}" height="${bBottom-bTop}" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.85"/>`;
    out += `<rect x="${bx-4}" y="${bTop-corniceH+8}" width="${bw+8}" height="${corniceH}" fill="none" stroke="currentColor" stroke-width="1" opacity="0.7"/>`;

    const floorsTop = bTop + corniceH + 4;
    const floorH = (groundTop - floorsTop) / p.floors;
    const gap = bw / p.bays;
    const winW = gap * 0.6;

    for(let f=0; f<p.floors; f++){
      const rowTop = floorsTop + f*floorH;
      if(f > 0){
        out += `<line x1="${bx}" y1="${rowTop.toFixed(1)}" x2="${bx+bw}" y2="${rowTop.toFixed(1)}" stroke="currentColor" stroke-width="0.6" opacity="0.4"/>`;
      }
      const winY = rowTop + floorH*0.12;
      const winH = floorH*0.68;
      for(let b=0; b<p.bays; b++){
        const wx = bx + gap*b + (gap-winW)/2;
        out += `<rect x="${wx.toFixed(1)}" y="${winY.toFixed(1)}" width="${winW.toFixed(1)}" height="${winH.toFixed(1)}" fill="none" stroke="currentColor" stroke-width="1"/>`;
      }
    }

    function flankWindow(x, arched){
      return arched
        ? `<path d="M${x} 210 L${x} 168 A14 14 0 0 1 ${x+28} 168 L${x+28} 210 Z" fill="none" stroke="currentColor" stroke-width="1.1"/>`
        : `<rect x="${x}" y="168" width="28" height="42" fill="none" stroke="currentColor" stroke-width="1.1"/>`;
    }
    out += flankWindow(46, p.groundArched);
    out += flankWindow(126, p.groundArched);
    out += `<rect x="88" y="180" width="24" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>`;
    out += `<line x1="88" y1="180" x2="112" y2="180" stroke="currentColor" stroke-width="1"/>`;

    return out;
  }

  function applyFacadeVariant(params){
    facadeSvgEl.innerHTML = buildFacadeMarkup(params);
  }

  makeDraggable(facadeEl, {
    onOffscreenReset: () => {
      facadeEl.classList.remove('show');
      unregisterLeader(facadeEl);
    }
  });

  function resetFacadePosition(){
    facadeEl.style.left = 'auto';
    facadeEl.style.top = '6%';
    facadeEl.style.right = '5%';
    facadeEl.style.bottom = 'auto';
    facadeEl.style.transform = 'none';
  }

  function toggleFacade(){
    const opening = !facadeEl.classList.contains('show');
    if(opening){
      resetFacadePosition();
      facadeEl.classList.add('show');
      registerLeader(facadeEl);
    } else {
      facadeEl.classList.remove('show');
      unregisterLeader(facadeEl);
    }
  }

  // Double-click the isolated object to open the facade/elevation. Detected
  // manually (two pointerdowns close in time+position) rather than relying
  // on the native dblclick event, since OrbitControls' own low-level pointer
  // handling on this same canvas can interfere with that synthesis.
  let lastObjClickTime = 0, lastObjClickX = 0, lastObjClickY = 0;
  stage.addEventListener('pointerdown', (e) => {
    if(mode !== 'isolated') return;
    if(e.target.closest('.nav-mark, #isolate-photos, #isolate-address, #isolate-blockmap, #isolate-facade, .enlarged-photo')) return;
    const now = performance.now();
    const isDouble = (now - lastObjClickTime < 350) && Math.hypot(e.clientX - lastObjClickX, e.clientY - lastObjClickY) < 12;
    lastObjClickTime = isDouble ? 0 : now;
    lastObjClickX = e.clientX; lastObjClickY = e.clientY;
    if(isDouble){
      setNdc(e);
      raycaster.setFromCamera(ndc, inspectCamera);
      const hits = raycaster.intersectObject(selected.mesh);
      if(hits.length) toggleFacade();
    }
  }, true); // capture phase: see the event before OrbitControls does

  // Same manual approach for the highlighted building in the site plan.
  // Delegated (rather than bound to a single fixed element) since which lot
  // is ".highlight" changes per artifact — checked live on every click.
  let lastBldgClickTime = 0;
  document.querySelector('#isolate-blockmap svg').addEventListener('pointerdown', (e) => {
    const lot = e.target.closest('.blockmap-lot.highlight');
    if(!lot) return; // not the highlighted lot — let it bubble to the panel's own drag handler
    e.stopPropagation();
    const now = performance.now();
    if(now - lastBldgClickTime < 350){
      toggleFacade();
      lastBldgClickTime = 0;
    } else {
      lastBldgClickTime = now;
    }
  });

  // M behaves differently depending on context: normal grid browsing still
  // sends you to the full map page, but from inside an isolated object it
  // pops up the block-plan card instead. Its href is removed entirely while
  // isolated (see enterInspectMode/returnToGrid), so navigation is disabled
  // at the source, not just intercepted here.
  const navMapEl = document.getElementById('nav-map');

  // Pulses M if it hasn't been clicked 15s after isolating an object — a
  // nudge toward the site plan, isolation-view only (never on the grid).
  let mPulseTimer = null;
  function armMPulseTimer(){
    clearTimeout(mPulseTimer);
    navMapEl.classList.remove('pulse');
    mPulseTimer = setTimeout(() => {
      if(mode === 'isolated') navMapEl.classList.add('pulse');
    }, 15000);
  }
  function disarmMPulse(){
    clearTimeout(mPulseTimer);
    navMapEl.classList.remove('pulse');
  }

  navMapEl.addEventListener('click', (e) => {
    if(mode === 'isolated'){
      e.preventDefault();
      disarmMPulse();
      toggleBlockMap();
    }
  });

  function showIsolateInfo(){
    resetIsolatePanelPosition();
    isolatePhotosEl.classList.add('show');
    isolateAddressEl.classList.add('show');
    registerLeader(isolatePhotosEl);
    const r = isolatePhotosEl.getBoundingClientRect();
    isolatePhotosHome = { left: r.left, top: r.top };
  }
  function hideIsolateInfo(){
    isolatePhotosEl.classList.remove('show');
    isolateAddressEl.classList.remove('show');
    blockMapEl.classList.remove('show');
    facadeEl.classList.remove('show');
    unregisterLeader(isolatePhotosEl);
    unregisterLeader(blockMapEl);
    unregisterLeader(facadeEl);
    document.querySelectorAll('.enlarged-photo').forEach(el => { unregisterLeader(el); el.remove(); });
  }

  /* ---------------- ISOLATE / ORBIT TRANSITION ---------------- */
  const GROW_FACTOR = 4.6; // roughly double the previous grow amount

  function isolate(cell){
    mode = 'transition';
    selected = cell;
    applyBlockMapHighlight(cell.entry.blockLotIndex);
    applyFacadeVariant(cell.entry.facade);
    isolateAddressTextEl.textContent = cell.entry.address;
    cell.hovered = false;
    cell.wasHovered = false;
    cell.jitter.set(0,0,0);
    cell.jitterTarget.set(0,0,0);
    cell.mesh.position.set(
      wrap(cell.baseX - offset.x, viewW),
      wrap(cell.baseY - offset.y, viewH),
      0
    );
    hintEl.style.opacity = 0;
    counterEl.style.opacity = 0;

    const startScale = cell.mesh.scale.x;
    const targetScale = cell.scaleBase * GROW_FACTOR;
    const growDuration = 650;
    const fadeDuration = 1050; // fade lags behind the grow, finishes slower
    const t0 = performance.now();

    function tween(){
      const now = performance.now();
      const tGrow = Math.min(1, (now - t0) / growDuration);
      const tFade = Math.min(1, (now - t0) / fadeDuration);
      const eGrow = 1 - Math.pow(1 - tGrow, 3);
      const eFade = 1 - Math.pow(1 - tFade, 3);

      cell.mesh.scale.setScalar(startScale + (targetScale - startScale) * eGrow);
      cells.forEach(c => {
        if(c !== selected) c.materials.forEach(m => m.opacity = 1 - eFade);
      });

      if(tGrow < 1 || tFade < 1){
        requestAnimationFrame(tween);
      } else {
        cells.forEach(c => { if(c !== selected) c.mesh.visible = false; });
        enterInspectMode(cell, targetScale);
      }
    }
    tween();
  }

  function enterInspectMode(cell, grownScale){
    const fovRad = THREE.MathUtils.degToRad(inspectCamera.fov);
    const matchDistance = viewH / (2 * Math.tan(fovRad / 2));

    // Since 1 world unit = 1 screen pixel at matchDistance (see below), and
    // orbit has no zoom, this stays valid for the whole isolated session.
    isolatedObjectRadius = grownScale * 1.3;

    // Phase 1: position the perspective camera exactly like the orthographic
    // grid camera was — centered on world origin, facing straight down -Z.
    // At this pose the object stays in the exact screen position it was in
    // a moment ago, so switching cameras here produces no visible jump.
    inspectCamera.position.set(0, 0, matchDistance);
    inspectCamera.quaternion.identity();
    mode = 'isolated'; // render loop now uses inspectCamera
    navMapEl.removeAttribute('href'); // M can no longer navigate away while isolated

    // Phase 2: glide the camera from that pose to one centered on + looking
    // at the object, so it settles into frame instead of snapping there.
    const startPos = inspectCamera.position.clone();
    const startQuat = inspectCamera.quaternion.clone();

    const endPos = new THREE.Vector3(
      cell.mesh.position.x, cell.mesh.position.y, cell.mesh.position.z + matchDistance
    );
    const m = new THREE.Matrix4().lookAt(endPos, cell.mesh.position, new THREE.Vector3(0,1,0));
    const endQuat = new THREE.Quaternion().setFromRotationMatrix(m);

    const duration = 500;
    const t0 = performance.now();

    function settle(){
      const t = Math.min(1, (performance.now() - t0) / duration);
      const e = 1 - Math.pow(1 - t, 3);
      inspectCamera.position.lerpVectors(startPos, endPos, e);
      inspectCamera.quaternion.slerpQuaternions(startQuat, endQuat, e);

      if(t < 1){
        requestAnimationFrame(settle);
      } else {
        orbitControls = new THREE.OrbitControls(inspectCamera, renderer.domElement);
        orbitControls.target.copy(cell.mesh.position);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.08;
        orbitControls.enableZoom = false; // orbit only for now
        orbitControls.enablePan = false;
        orbitControls.update();
        showIsolateInfo();
        armMPulseTimer();
      }
    }
    settle();
  }

  function returnToGrid(){
    if(mode !== 'isolated') return;
    disarmMPulse();
    if(orbitControls){ orbitControls.dispose(); orbitControls = null; }
    hideIsolateInfo();
    mode = 'transition';
    cells.forEach(c => { if(c !== selected) c.mesh.visible = true; });

    const cell = selected;
    const startScale = cell.mesh.scale.x;
    const targetScale = cell.scaleBase;
    const duration = 550;
    const t0 = performance.now();

    function tween(){
      const t = Math.min(1, (performance.now() - t0) / duration);
      const e = 1 - Math.pow(1 - t, 3);

      cell.mesh.scale.setScalar(startScale + (targetScale - startScale) * e);
      cells.forEach(c => {
        if(c !== selected) c.materials.forEach(m => m.opacity = e);
      });

      if(t < 1){
        requestAnimationFrame(tween);
      } else {
        selected = null;
        mode = 'grid';
        navMapEl.setAttribute('href', 'map-test/index.html');
        hintEl.style.opacity = 1;
        counterEl.style.opacity = 1;
      }
    }
    tween();
  }

  // N (top-left) is now the only way back to the grid from isolation —
  // clicking the object or the background no longer returns you there.

  /* ---------------- RESIZE ---------------- */
  function onResize(){
    viewW = window.innerWidth;
    viewH = window.innerHeight;

    gridCamera.left = -viewW/2; gridCamera.right = viewW/2;
    gridCamera.top = viewH/2; gridCamera.bottom = -viewH/2;
    gridCamera.updateProjectionMatrix();

    inspectCamera.aspect = viewW/viewH;
    inspectCamera.updateProjectionMatrix();

    renderer.setSize(viewW, viewH);
    if(ssaoComposer) ssaoComposer.setSize(viewW, viewH);
    if(mode === 'grid'){
      buildGrid();
      applyColorScheme();
    }
  }
  window.addEventListener('resize', onResize);

  /* ---------------- RENDER LOOP ---------------- */
  let lastT = performance.now();
  function animate(now){
    requestAnimationFrame(animate);
    const dt = Math.min(64, now - lastT);
    lastT = now;

    cells.forEach(c => {
      if(mode !== 'grid' && c === selected) return;
      c.mesh.rotation.x += c.entry.spin * 0.01;
      c.mesh.rotation.y += c.entry.spin * 0.014;
    });

    if(mode === 'grid'){
      if(!dragging && (Math.abs(inertia.x) > INERTIA_EPSILON || Math.abs(inertia.y) > INERTIA_EPSILON)){
        offset.x -= inertia.x;
        offset.y += inertia.y;
        inertia.x *= FRICTION;
        inertia.y *= FRICTION;
      } else if(!dragging){
        inertia.x = 0; inertia.y = 0;
      }
      applyPositions(dt);
    }

    if(mode === 'isolated'){
      if(orbitControls) orbitControls.update();
      if(ssaoComposer) ssaoComposer.render();
      else renderer.render(scene, inspectCamera);
    } else {
      renderer.render(scene, gridCamera);
    }
  }

  onResize();
  requestAnimationFrame(animate);

  // Deep-link entry point: ?isolate=N jumps straight into the isolated view
  // for cells[N] — used by the map page's "click the floating object"
  // shortcut to a linked grid artifact. The other 224 cells are hidden
  // BEFORE isolate() ever runs (not faded out by it) so this never shows
  // the full busy grid first — the linked artifact just appears floating
  // where it already sits, then grows and centers exactly like a normal
  // click, without the grid ever having been visible.
  (function(){
    const params = new URLSearchParams(window.location.search);
    const isolateIdx = parseInt(params.get('isolate'), 10);
    if(!isNaN(isolateIdx) && cells[isolateIdx]){
      landing.classList.add('hidden');
      cells.forEach(c => {
        if(c !== cells[isolateIdx]){ c.mesh.visible = false; c.materials.forEach(m => m.opacity = 0); }
      });
      isolate(cells[isolateIdx]);
    }
    document.documentElement.style.visibility = 'visible'; // undo the head-script guard, whether or not isolate ran
  })();
</script>
</body>
</html>
