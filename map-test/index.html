<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Viewer Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ width:100%; height:100%; overflow:hidden; background:#ffffff; font-family:sans-serif; }

  .nav-mark{
    position:fixed; z-index:15;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    color:#0A0A0A;
    font-size:30px;
    line-height:1;
    text-decoration:none;
    background:none;
    border:none;
    cursor:pointer;
    user-select:none;
    padding:4px;
    opacity:0.9;
    transition:opacity .2s ease;
  }
  .nav-mark:hover{ opacity:1; }
  #nav-home{ top:20px; left:24px; }
  #nav-map{ bottom:20px; right:24px; cursor:default; } /* already on the map page — present for visual consistency, not a link */

  #map-viewport{ position:fixed; inset:0; cursor:grab; }
  #map-viewport.dragging{ cursor:grabbing; }
  #map-canvas{ display:block; width:100%; height:100%; }

  .hint{
    position:fixed; bottom:20px; left:20px; z-index:5;
    color:rgba(10,10,10,0.55);
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    font-family:monospace;
  }
  .status{
    position:fixed; bottom:20px; right:20px; z-index:5;
    color:rgba(10,10,10,0.4);
    font-size:11px; letter-spacing:0.05em;
    font-family:monospace;
  }
  .loading{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    color:rgba(10,10,10,0.6);
    font-family:monospace; font-size:13px; letter-spacing:0.08em;
    background:#ffffff;
    transition:opacity .3s ease;
  }
  .loading.hidden{ opacity:0; pointer-events:none; }
</style>
</head>
<body>

<div id="map-viewport">
  <canvas id="map-canvas"></canvas>
</div>
<a class="nav-mark" id="nav-home" href="../index.html">N</a>
<span class="nav-mark" id="nav-map">M</span>
<div class="hint">Scroll to zoom &middot; drag to pan &middot; double-click to reset</div>
<div class="status" id="status"></div>
<div class="loading" id="loading">Loading map&hellip;</div>

<script>
  const viewport = document.getElementById('map-viewport');
  const canvas = document.getElementById('map-canvas');
  const ctx = canvas.getContext('2d');
  const loadingEl = document.getElementById('loading');
  const statusEl = document.getElementById('status');

  let dpr = Math.min(window.devicePixelRatio || 1, 3);
  let rawSvgText = null;
  let mapW = 612, mapH = 792;

  // Camera: `scale` = screen pixels per SVG unit. (originX, originY) = the
  // SVG-space coordinate that lands at screen pixel (0,0).
  let scale = 1;
  let originX = 0, originY = 0;

  // The last genuinely fresh high-res render, kept around so we can cheaply
  // blit-and-transform it for instant feedback while actively dragging/zooming.
  let lastCrisp = null; // { canvas, srcX, srcY, srcW, srcH }
  let refreshTimer = null;
  let dragging = false;

  function resizeCanvas(){
    canvas.width = Math.round(viewport.clientWidth * dpr);
    canvas.height = Math.round(viewport.clientHeight * dpr);
  }

  function fitToScreen(){
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    scale = Math.min(vw / mapW, vh / mapH) * 0.92;
    originX = mapW / 2 - (vw / 2) / scale;
    originY = mapH / 2 - (vh / 2) / scale;
    scheduleCrispRefresh(true);
  }

  function currentViewRect(){
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    return { srcX: originX, srcY: originY, srcW: vw / scale, srcH: vh / scale, vw, vh };
  }

  /* ---------------- CHEAP LIVE DRAW (during active drag/zoom) ---------------- */
  function cheapDraw(){
    const { srcX, srcY, srcW, srcH, vw, vh } = currentViewRect();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, vw, vh);
    if(!lastCrisp) return;

    // Map the last crisp render (which covers lastCrisp.srcX/Y/W/H) onto the
    // current view rect via simple proportional scaling — cheap bitmap blit,
    // no SVG re-parsing, so this stays smooth regardless of file complexity.
    const sx = (srcX - lastCrisp.srcX) / lastCrisp.srcW * lastCrisp.canvas.width;
    const sy = (srcY - lastCrisp.srcY) / lastCrisp.srcH * lastCrisp.canvas.height;
    const sw = (srcW / lastCrisp.srcW) * lastCrisp.canvas.width;
    const sh = (srcH / lastCrisp.srcH) * lastCrisp.canvas.height;
    ctx.drawImage(lastCrisp.canvas, sx, sy, sw, sh, 0, 0, vw, vh);

    statusEl.textContent = 'refreshing…';
  }

  /* ---------------- CRISP REFRESH (debounced, genuinely fresh decode) ------
     Crops the SVG's own viewBox down to exactly the visible region and sets
     width/height to the actual destination pixel size, forcing the browser
     to decode a brand-new raster at exactly that resolution — bounded by
     screen size, not the whole map, regardless of zoom level.
  ----------------------------------------------------------------------- */
  function scheduleCrispRefresh(immediate){
    clearTimeout(refreshTimer);
    const delay = immediate ? 0 : 160;
    refreshTimer = setTimeout(doCrispRefresh, delay);
  }

  function doCrispRefresh(){
    if(!rawSvgText) return;
    const { srcX, srcY, srcW, srcH, vw, vh } = currentViewRect();
    const destW = Math.max(1, Math.round(vw * dpr));
    const destH = Math.max(1, Math.round(vh * dpr));

    const cropped = rawSvgText.replace(/<svg\b([^>]*)>/, (m, attrs) => {
      const cleaned = attrs
        .replace(/\swidth="[^"]*"/, '')
        .replace(/\sheight="[^"]*"/, '')
        .replace(/\sviewBox="[^"]*"/, '');
      return `<svg${cleaned} viewBox="${srcX} ${srcY} ${srcW} ${srcH}" width="${destW}" height="${destH}">`;
    });

    const blob = new Blob([cropped], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const off = document.createElement('canvas');
      off.width = destW; off.height = destH;
      const octx = off.getContext('2d');
      octx.drawImage(img, 0, 0, destW, destH);
      URL.revokeObjectURL(url);

      lastCrisp = { canvas: off, srcX, srcY, srcW, srcH };
      // Only draw it if the view hasn't moved on since this refresh was requested
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.drawImage(off, 0, 0, vw, vh);
      statusEl.textContent = `${Math.round(scale * 100) / 100}x`;
      loadingEl.classList.add('hidden');
    };
    img.onerror = () => {
      console.error('Crisp refresh failed to decode SVG crop');
    };
    img.src = url;
  }

  fetch('map.svg')
    .then(r => {
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(svgText => {
      const vbMatch = svgText.match(/viewBox="([^"]+)"/);
      if(vbMatch){
        const parts = vbMatch[1].trim().split(/\s+/).map(Number);
        mapW = parts[2]; mapH = parts[3];
      }
      rawSvgText = svgText;
      resizeCanvas();
      fitToScreen();
    })
    .catch(err => {
      loadingEl.textContent = 'Failed to load map.svg — ' + err.message;
      console.error('Map load failed:', err);
    });

  /* ---------------- ZOOM (wheel, zoom-to-cursor) ---------------- */
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const mapX = originX + mx / scale;
    const mapY = originY + my / scale;

    const zoomFactor = Math.pow(1.0015, -e.deltaY);
    let newScale = scale * zoomFactor;
    newScale = Math.max(0.05, Math.min(newScale, 60));

    originX = mapX - mx / newScale;
    originY = mapY - my / newScale;
    scale = newScale;

    cheapDraw();
    scheduleCrispRefresh(false);
  }, { passive:false });

  /* ---------------- PAN (drag) ---------------- */
  let lastX = 0, lastY = 0;
  viewport.addEventListener('pointerdown', (e) => {
    dragging = true;
    viewport.classList.add('dragging');
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    originX -= dx / scale;
    originY -= dy / scale;
    cheapDraw();
  });
  window.addEventListener('pointerup', () => {
    if(dragging){ dragging = false; viewport.classList.remove('dragging'); scheduleCrispRefresh(false); }
  });

  window.addEventListener('resize', () => { resizeCanvas(); fitToScreen(); });
  window.addEventListener('dblclick', fitToScreen);
</script>
</body>
</html>
