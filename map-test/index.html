<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Viewer Test</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ width:100%; height:100%; overflow:hidden; background:#141414; font-family:sans-serif; }

  #map-viewport{
    position:fixed; inset:0;
    overflow:hidden;
    cursor:grab;
    background:#141414;
  }
  #map-viewport.dragging{ cursor:grabbing; }

  #map-stage{
    position:absolute;
    top:0; left:0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* the injected SVG should size itself off its own viewBox, not fight it */
  #map-stage svg{
    display:block;
    background:#fff; /* the drawing itself is white paper with colored linework */
  }

  .hint{
    position:fixed; bottom:20px; left:20px; z-index:5;
    color:rgba(255,255,255,0.55);
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    font-family:monospace;
  }
  .loading{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.6);
    font-family:monospace; font-size:13px; letter-spacing:0.08em;
    background:#141414;
    transition:opacity .3s ease;
  }
  .loading.hidden{ opacity:0; pointer-events:none; }
</style>
</head>
<body>

<div id="map-viewport">
  <div id="map-stage"></div>
</div>
<div class="hint">Scroll to zoom &middot; drag to pan</div>
<div class="loading" id="loading">Loading map&hellip;</div>

<script>
  const viewport = document.getElementById('map-viewport');
  const stage = document.getElementById('map-stage');
  const loadingEl = document.getElementById('loading');

  let scale = 1;
  let tx = 0, ty = 0;
  let svgW = 612, svgH = 792; // fallback until the real viewBox is read

  function applyTransform(){
    stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function fitToScreen(){
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const fitScale = Math.min(vw / svgW, vh / svgH) * 0.92;
    scale = fitScale;
    tx = (vw - svgW * scale) / 2;
    ty = (vh - svgH * scale) / 2;
    applyTransform();
  }

  fetch('map.svg')
    .then(r => {
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(svgText => {
      stage.innerHTML = svgText;
      const svgEl = stage.querySelector('svg');
      if(svgEl){
        const vb = svgEl.getAttribute('viewBox');
        if(vb){
          const parts = vb.split(/\s+/).map(Number);
          svgW = parts[2]; svgH = parts[3];
        }
        // let our own transform control scale, not the SVG's own width/height
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.style.width = svgW + 'px';
        svgEl.style.height = svgH + 'px';
      }
      fitToScreen();
      loadingEl.classList.add('hidden');
    })
    .catch(err => {
      loadingEl.textContent = 'Failed to load map.svg — ' + err.message;
      console.error('Map load failed:', err);
    });

  /* ---------------- ZOOM (wheel, zoom-to-cursor) ---------------- */
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // point under the cursor in map-space before zoom
    const mapX = (mx - tx) / scale;
    const mapY = (my - ty) / scale;

    const zoomFactor = Math.pow(1.0015, -e.deltaY);
    let newScale = scale * zoomFactor;
    newScale = Math.max(0.05, Math.min(newScale, 40));

    tx = mx - mapX * newScale;
    ty = my - mapY * newScale;
    scale = newScale;
    applyTransform();
  }, { passive:false });

  /* ---------------- PAN (drag) ---------------- */
  let dragging = false, lastX = 0, lastY = 0;
  viewport.addEventListener('pointerdown', (e) => {
    dragging = true;
    viewport.classList.add('dragging');
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    tx += e.clientX - lastX;
    ty += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyTransform();
  });
  window.addEventListener('pointerup', () => {
    dragging = false;
    viewport.classList.remove('dragging');
  });

  window.addEventListener('resize', fitToScreen);
  window.addEventListener('dblclick', fitToScreen);
</script>
</body>
</html>
